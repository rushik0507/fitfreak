<!DOCTYPE html>
<html>
  <head>
    <title>Calorie Calculator</title>
    <script>
      function calculateCalories() {
        // Get user input
        var gender = document.getElementById("gender").value;
        var age = document.getElementById("age").value;
        var weight = document.getElementById("weight").value;
        var height = document.getElementById("height").value;
        var activityLevel = parseFloat(
          document.getElementById("activityLevel").value
        );

        // Calculate BMR
        var bmr = 0;
        if (gender === "male") {
          bmr = 10 * weight + 6.25 * height - 5 * age + 5;
        } else if (gender === "female") {
          bmr = 10 * weight + 6.25 * height - 5 * age - 161;
        }

        // Adjust for activity level
        var calorieIntake = bmr * activityLevel;

        // Update UI
        document.getElementById("result").textContent =
          "Your estimated daily calorie intake is: " + calorieIntake.toFixed(2);
      }
      function calculateBMI() {
        var weightInput = document.getElementById("weights");
        var heightInput = document.getElementById("heights");
        var resultElement = document.getElementById("results");

        var weight = parseFloat(weightInput.value);
        var height = parseFloat(heightInput.value) / 100; // Convert height from cm to meters

        if (weight && height) {
          var bmi = weight / (height * height);
          resultElement.textContent = "Your BMI is: " + bmi.toFixed(2); // Display BMI with two decimal places
        } else {
          resultElement.textContent =
            "Please enter valid weight and height values.";
        }
      }
    </script>
  </head>
  <body>
    <h1>Calorie Calculator</h1>
    <form>
      <label for="gender">Gender:</label>
      <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option></select
      ><br /><br />

      <label for="age">Age:</label>
      <input type="text" id="age" /><br /><br />

      <label for="weight">Weight (kg):</label>
      <input type="text" id="weight" /><br /><br />

      <label for="height">Height (cm):</label>
      <input type="text" id="height" /><br /><br />

      <label for="activityLevel">Activity Level:</label>
      <select id="activityLevel">
        <option value="1.2">Sedentary</option>
        <option value="1.375">Lightly active</option>
        <option value="1.55">Moderately active</option>
        <option value="1.725">Very active</option>
        <option value="1.9">Extra active</option></select
      ><br /><br />

      <button type="button" onclick="calculateCalories()">Calculate</button>
    </form>

    <div id="result"></div>

    <h1>BMI Calculator</h1>
    <label for="weight">Weight (kg):</label>
    <input type="number" id="weights" step="0.01" />
    <br />
    <label for="height">Height (cm):</label>
    <input type="number" id="heights" step="0.01" />
    <br />
    <button onclick="calculateBMI()">Calculate BMI</button>
    <br />
    <p id="results"></p>
  </body>
  <!-- <script src="cloud.js"></script> -->
</html>
